version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - REGISTRY_URI=$(echo $REPOSITORY_URI | cut -d/ -f1)
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REGISTRY_URI
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t my-docker-image .
      - docker tag my-docker-image:latest $REPOSITORY_URI:latest
  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $REPOSITORY_URI:latest
artifacts:
  files:
    - appspec.yml
    - scripts/deploy.sh
